name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    name: Run Tests and Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show Node and npm version
        run: |
          node -v
          npm -v

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          npm install -g yarn
          yarn --version
          yarn install

      - name: Install frontend dependencies and build
        working-directory: ./frontend
        run: |
          df -h
          sudo rm -rf build
          yarn install
          yarn build

      - name: Run backend tests
        working-directory: ./backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        run: npm test

      - name: Create backend .env from PROD secret
        run: |
          cd backend
          rm -f .env
          echo "${{ secrets.PROD }}" > .env

      - name: Recreate PM2 services
        run: |
          pm2 delete backend || true
          pm2 delete Frontend || true
          pm2 start "npm run start" --name backend --cwd ./backend
          pm2 serve ./frontend/build 3000 --name Frontend --spa
          pm2 save

      - name: Show PM2 status
        run: pm2 status